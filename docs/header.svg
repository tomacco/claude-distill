<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5d4;stop-opacity:1">
        <animate attributeName="stop-color" values="#00f5d4;#3a86ff;#9b5ff7;#00f5d4" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#9b5ff7;stop-opacity:1">
        <animate attributeName="stop-color" values="#9b5ff7;#00f5d4;#3a86ff;#9b5ff7" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#3a86ff;stop-opacity:1">
        <animate attributeName="stop-color" values="#3a86ff;#9b5ff7;#00f5d4;#3a86ff" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8080b0;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#8080b0;stop-opacity:0.3"/>
    </linearGradient>
    <!-- Pulse circles -->
    <radialGradient id="pulse1">
      <stop offset="0%" style="stop-color:#00f5d4;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00f5d4;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="pulse2">
      <stop offset="0%" style="stop-color:#9b5ff7;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#9b5ff7;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="#05050a"/>

  <!-- Animated pulse rings -->
  <circle cx="400" cy="100" r="40" fill="url(#pulse1)">
    <animate attributeName="r" values="40;120;40" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="100" r="60" fill="url(#pulse2)">
    <animate attributeName="r" values="60;150;60" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="100" r="30" fill="url(#pulse1)">
    <animate attributeName="r" values="30;100;30" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Floating dots (neural nodes) -->
  <circle cx="180" cy="80" r="2" fill="#00f5d4" opacity="0.6">
    <animate attributeName="cy" values="80;70;80" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="130" r="1.5" fill="#9b5ff7" opacity="0.5">
    <animate attributeName="cy" values="130;120;130" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="70" r="2" fill="#3a86ff" opacity="0.5">
    <animate attributeName="cy" values="70;60;70" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="620" cy="140" r="1.5" fill="#00f5d4" opacity="0.4">
    <animate attributeName="cy" values="140;130;140" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="50" r="1" fill="#f72585" opacity="0.4">
    <animate attributeName="cy" values="50;42;50" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="155" r="1.5" fill="#9b5ff7" opacity="0.3">
    <animate attributeName="cy" values="155;145;155" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="150" r="1" fill="#3a86ff" opacity="0.4">
    <animate attributeName="cx" values="150;155;150" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="60" r="1" fill="#f72585" opacity="0.3">
    <animate attributeName="cx" values="680;675;680" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Faint connection lines -->
  <line x1="180" y1="80" x2="250" y2="130" stroke="#8080b0" stroke-width="0.5" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="550" y1="70" x2="620" y2="140" stroke="#8080b0" stroke-width="0.5" opacity="0.15">
    <animate attributeName="opacity" values="0.15;0.4;0.15" dur="4s" repeatCount="indefinite"/>
  </line>
  <line x1="320" y1="50" x2="400" y2="85" stroke="#8080b0" stroke-width="0.3" opacity="0.1">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="3.5s" repeatCount="indefinite"/>
  </line>
  <line x1="500" y1="155" x2="550" y2="70" stroke="#8080b0" stroke-width="0.3" opacity="0.1">
    <animate attributeName="opacity" values="0.1;0.25;0.1" dur="5s" repeatCount="indefinite"/>
  </line>

  <!-- Title -->
  <text x="400" y="95" font-family="monospace" font-size="42" font-weight="bold" fill="url(#grad1)" text-anchor="middle">claude-distill</text>

  <!-- Tagline -->
  <text x="400" y="130" font-family="monospace" font-size="14" fill="#8080b0" text-anchor="middle" letter-spacing="3">not what it remembers — how it learns</text>

  <!-- Subtitle -->
  <text x="400" y="158" font-family="monospace" font-size="11" fill="#6a6a9a" text-anchor="middle">first-principles memory for Claude Code</text>

  <!-- Version -->
  <text x="400" y="180" font-family="monospace" font-size="10" fill="#4a4a6a" text-anchor="middle">v0.7.0</text>
</svg>
